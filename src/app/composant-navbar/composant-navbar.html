<nav class="navbar">
  <div class="logo">LocaRial</div>

  <!-- Bouton hamburger pour mobile -->
  <button class="hamburger" (click)="toggleMenu()">☰</button>

  <!-- Liens de navigation -->
  <ul class="nav-links" [class.open]="menuOuvert">
    <li><a routerLink="/" (click)="fermerMenu()">Accueil</a></li>
    <li><a routerLink="/catalogue" (click)="fermerMenu()">Catalogue</a></li>
    <li><a routerLink="/contact" (click)="fermerMenu()">Contact</a></li>

    <!-- Affiche Mon profil et Déconnexion si connecté -->
    @if (estConnecte()) {
      <!-- Mon profil caché si admin -->
      @if (!estAdmin()) {
        <li><a routerLink="/utlisateurs" (click)="fermerMenu()">Mon profil</a></li>
      }
      <li><a (click)="seDeconnecter()" class="btn-connexion" style="cursor:pointer">Déconnexion</a></li>
    } @else {
      <!-- Affiche Connexion si non connecté -->
      <li><a routerLink="/connexion" class="btn-connexion" (click)="fermerMenu()">Connexion</a></li>
    }
  </ul>
</nav>
